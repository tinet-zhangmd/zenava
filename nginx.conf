# Nginx 配置文件 - Zenava Webapp
# 放置位置: /etc/nginx/sites-available/zenava 或 /etc/nginx/conf.d/zenava.conf

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # 替换为您的域名
    
    # 如果需要 HTTPS，取消注释以下行并配置 SSL
    # listen 443 ssl http2;
    # ssl_certificate /path/to/your/certificate.crt;
    # ssl_certificate_key /path/to/your/private.key;
    
    # 日志文件
    access_log /var/log/nginx/zenava-access.log;
    error_log /var/log/nginx/zenava-error.log;
    
    # 客户端最大上传大小
    client_max_body_size 50M;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        root /var/www/zenava/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 静态资源目录
    location /static/ {
        alias /var/www/zenava/dist/static/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # 图片和视频资源
    location /assets/ {
        alias /var/www/zenava/dist/assets/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # 反向代理到 Node.js 应用
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 健康检查端点（可选）
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

